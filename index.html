<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Public APIs Search</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            color: white;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .subtitle {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .search-container {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .search-input {
            flex: 1;
            min-width: 250px;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        .search-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .search-input::placeholder {
            color: #999;
        }

        .filter-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        select {
            padding: 10px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.95em;
            cursor: pointer;
            transition: border-color 0.3s;
            background: white;
        }

        select:focus {
            outline: none;
            border-color: #667eea;
        }

        .stats {
            font-size: 0.9em;
            color: #666;
            margin-top: 15px;
        }

        .results-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .api-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }

        .api-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }

        .api-name {
            font-size: 1.2em;
            font-weight: 600;
            margin-bottom: 10px;
            color: #333;
        }

        .api-description {
            font-size: 0.95em;
            color: #666;
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .api-meta {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 500;
        }

        .badge-category {
            background: #e3f2fd;
            color: #1976d2;
        }

        .badge-auth {
            background: #fff3e0;
            color: #f57c00;
        }

        .badge-https {
            background: #e8f5e9;
            color: #388e3c;
        }

        .api-link {
            color: #667eea;
            text-decoration: none;
            font-size: 0.9em;
            word-break: break-all;
        }

        .api-link:hover {
            text-decoration: underline;
        }

        .no-results {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 12px;
            color: #999;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: white;
            font-size: 1.2em;
        }

        .error {
            background: white;
            padding: 20px;
            border-radius: 12px;
            color: #d32f2f;
            margin-bottom: 20px;
        }

        .categories-list {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        .category-tag {
            background: #f5f5f5;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            cursor: pointer;
            transition: background 0.3s, color 0.3s;
            border: 1px solid transparent;
        }

        .category-tag:hover {
            background: #667eea;
            color: white;
        }

        .category-tag.active {
            background: #667eea;
            color: white;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }

            .results-container {
                grid-template-columns: 1fr;
            }

            .search-box {
                flex-direction: column;
            }

            .search-input {
                min-width: auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔍 Public APIs Search</h1>
            <p class="subtitle">Search through hundreds of free public APIs</p>
        </header>

        <div class="search-container">
            <div class="search-box">
                <input 
                    type="text" 
                    class="search-input" 
                    id="searchInput" 
                    placeholder="Search by name or description..."
                >
                <select id="authFilter">
                    <option value="">All Auth Types</option>
                    <option value="OAuth">OAuth</option>
                    <option value="apiKey">API Key</option>
                    <option value="no auth">No Auth</option>
                </select>
                <select id="httpsFilter">
                    <option value="">All HTTPS</option>
                    <option value="Yes">HTTPS Only</option>
                </select>
            </div>

            <div class="stats">
                <span id="resultsCount">0</span> APIs found
                <span id="filterInfo"></span>
            </div>
        </div>

        <div id="errorContainer"></div>
        <div id="loadingContainer" class="loading">Loading APIs...</div>
        <div class="results-container" id="resultsContainer"></div>
    </div>

    <script>
        class APISearchApp {
            constructor() {
                this.apis = [];
                this.filteredAPIs = [];
                this.init();
            }

            async init() {
                try {
                    await this.fetchAPIs();
                    this.setupEventListeners();
                    this.render();
                } catch (error) {
                    this.showError('Failed to load APIs: ' + error.message);
                }
            }

            async fetchAPIs() {
                // Fetch from the public-apis GitHub repository
                const response = await fetch('https://raw.githubusercontent.com/public-apis/public-apis/master/README.md');
                if (!response.ok) throw new Error('Failed to fetch APIs');
                
                const markdown = await response.text();
                this.parseAPIs(markdown);
            }

            parseAPIs(markdown) {
                // Parse the README markdown file to extract APIs
                const lines = markdown.split('\n');
                let currentCategory = '';
                let inAPISection = false;

                for (let i = 0; i < lines.length; i++) {
                    const line = lines[i];

                    // Detect main categories (## headers)
                    if (line.startsWith('## ')) {
                        currentCategory = line.replace('## ', '').trim();
                        inAPISection = currentCategory !== 'Index' && currentCategory !== 'License';
                        continue;
                    }

                    // Parse API entries (table rows)
                    if (inAPISection && line.includes('|') && !line.includes('---')) {
                        const api = this.parseAPIRow(line, currentCategory);
                        if (api && api.name) {
                            this.apis.push(api);
                        }
                    }
                }

                this.filteredAPIs = [...this.apis];
                console.log(`Loaded ${this.apis.length} APIs`);
            }

            parseAPIRow(line, category) {
                // Parse markdown table row: | Name | Description | Auth | HTTPS | Link |
                const cells = line.split('|').map(cell => cell.trim()).filter(cell => cell);
                
                if (cells.length < 4) return null;

                return {
                    name: cells[0],
                    description: cells[1] || '',
                    auth: cells[2] || 'No Auth',
                    https: cells[3] || 'No',
                    link: this.extractLink(cells[0]),
                    category: category
                };
            }

            extractLink(nameCell) {
                // Extract URL from markdown link format: [Name](URL)
                const match = nameCell.match(/\[([^\]]+)\]\(([^)]+)\)/);
                return match ? match[2] : '';
            }

            setupEventListeners() {
                document.getElementById('searchInput').addEventListener('input', (e) => {
                    this.search(e.target.value);
                });

                document.getElementById('authFilter').addEventListener('change', (e) => {
                    this.filterByAuth(e.target.value);
                });

                document.getElementById('httpsFilter').addEventListener('change', (e) => {
                    this.filterByHttps(e.target.value);
                });
            }

            search(query) {
                const lowercaseQuery = query.toLowerCase();
                this.filteredAPIs = this.apis.filter(api => 
                    api.name.toLowerCase().includes(lowercaseQuery) ||
                    api.description.toLowerCase().includes(lowercaseQuery) ||
                    api.category.toLowerCase().includes(lowercaseQuery)
                );
                this.applyFilters();
                this.render();
            }

            filterByAuth(auth) {
                this.applyFilters();
                this.render();
            }

            filterByHttps(https) {
                this.applyFilters();
                this.render();
            }

            applyFilters() {
                const authFilter = document.getElementById('authFilter').value;
                const httpsFilter = document.getElementById('httpsFilter').value;

                let filtered = this.apis;

                if (document.getElementById('searchInput').value) {
                    const query = document.getElementById('searchInput').value.toLowerCase();
                    filtered = filtered.filter(api => 
                        api.name.toLowerCase().includes(query) ||
                        api.description.toLowerCase().includes(query) ||
                        api.category.toLowerCase().includes(query)
                    );
                }

                if (authFilter) {
                    filtered = filtered.filter(api => api.auth.toLowerCase().includes(authFilter.toLowerCase()));
                }

                if (httpsFilter === 'Yes') {
                    filtered = filtered.filter(api => api.https.toLowerCase().includes('yes'));
                }

                this.filteredAPIs = filtered;
            }

            render() {
                const container = document.getElementById('resultsContainer');
                const loadingContainer = document.getElementById('loadingContainer');
                
                if (this.apis.length === 0) {
                    loadingContainer.style.display = 'block';
                    return;
                }

                loadingContainer.style.display = 'none';

                if (this.filteredAPIs.length === 0) {
                    container.innerHTML = '<div class="no-results">No APIs found matching your filters.</div>';
                    document.getElementById('resultsCount').textContent = '0';
                    return;
                }

                container.innerHTML = this.filteredAPIs.map(api => this.createCardHTML(api)).join('');
                document.getElementById('resultsCount').textContent = this.filteredAPIs.length;
            }

            createCardHTML(api) {
                const httpsClass = api.https.toLowerCase().includes('yes') ? 'badge-https' : '';
                const authClass = api.auth.includes('OAuth') ? 'badge-auth' : '';

                return `
                    <div class="api-card">
                        <div class="api-name">${this.escapeHtml(api.name)}</div>
                        <div class="api-description">${this.escapeHtml(api.description)}</div>
                        <div class="api-meta">
                            <span class="badge badge-category">${this.escapeHtml(api.category)}</span>
                            ${api.auth ? `<span class="badge badge-auth">${this.escapeHtml(api.auth)}</span>` : ''}
                            ${httpsClass ? `<span class="badge ${httpsClass}">HTTPS</span>` : ''}
                        </div>
                        ${api.link ? `<a href="${this.escapeHtml(api.link)}" target="_blank" class="api-link">${this.escapeHtml(api.link)}</a>` : ''}
                    </div>
                `;
            }

            escapeHtml(text) {
                const map = {
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    '"': '&quot;',
                    "'": '&#039;'
                };
                return text.replace(/[&<>"']/g, m => map[m]);
            }

            showError(message) {
                const container = document.getElementById('errorContainer');
                container.innerHTML = `<div class="error">${message}</div>`;
                document.getElementById('loadingContainer').style.display = 'none';
            }
        }

        // Initialize the app when DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => {
                new APISearchApp();
            });
        } else {
            new APISearchApp();
        }
    </script>
</body>
</html>
