<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Public APIs Search</title>
  <meta name="description" content="Search and filter free public APIs from public-apis/public-apis." />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <header class="page-header">
      <button class="header-btn" id="themeBtn" type="button" aria-label="Toggle dark mode">🌙 Dark mode</button>
      <h1>Public APIs Search</h1>
      <p class="subtitle">Discover and filter free public APIs</p>
    </header>

    <section class="stats-bar" id="statsBar" aria-label="Dataset statistics" hidden>
      <article class="stat-card"><span id="statTotal" class="stat-value">0</span><span class="stat-label">Total APIs</span></article>
      <article class="stat-card"><span id="statCategories" class="stat-value">0</span><span class="stat-label">Categories</span></article>
      <article class="stat-card"><span id="statHttps" class="stat-value">0</span><span class="stat-label">HTTPS</span></article>
      <article class="stat-card"><span id="statNoAuth" class="stat-value">0</span><span class="stat-label">No Auth</span></article>
    </section>

    <section class="panel" aria-label="Search and filters">
      <label for="searchInput" class="sr-only">Search APIs</label>
      <input
        id="searchInput"
        class="search-input"
        type="search"
        placeholder="Search by name, description, or category"
        autocomplete="off"
        spellcheck="false"
      />

      <div class="filter-group" role="group" aria-label="Filters">
        <label class="sr-only" for="authFilter">Authentication filter</label>
        <select id="authFilter">
          <option value="">All Auth Types</option>
          <option value="OAuth">OAuth</option>
          <option value="apiKey">API Key</option>
          <option value="No">No Auth</option>
        </select>

        <label class="sr-only" for="httpsFilter">HTTPS filter</label>
        <select id="httpsFilter">
          <option value="">All HTTPS</option>
          <option value="Yes">HTTPS Only</option>
        </select>

        <label class="sr-only" for="corsFilter">CORS filter</label>
        <select id="corsFilter">
          <option value="">All CORS</option>
          <option value="Yes">CORS Supported</option>
        </select>

        <label class="sr-only" for="sortSelect">Sort APIs</label>
        <select id="sortSelect">
          <option value="">Default Order</option>
          <option value="name-asc">Name A → Z</option>
          <option value="name-desc">Name Z → A</option>
          <option value="category">By Category</option>
        </select>

        <button class="btn btn-fav" id="favFilterBtn" type="button" aria-pressed="false">⭐ Favorites</button>
      </div>

      <div class="action-row">
        <p class="stats-text">
          Showing <strong id="resultsCount">0</strong> APIs
          <span class="cache-badge" id="cacheBadge" hidden></span>
        </p>
        <div class="action-buttons">
          <button class="btn btn-outline btn-sm" id="exportJSONBtn" type="button">↓ JSON</button>
          <button class="btn btn-outline btn-sm" id="exportCSVBtn" type="button">↓ CSV</button>
          <button class="btn btn-outline btn-sm" id="shareBtn" type="button">🔗 Share</button>
          <button class="btn btn-outline btn-sm" id="refreshBtn" type="button" hidden>↺ Refresh</button>
        </div>
      </div>

      <section class="categories-section" id="categoriesSection" hidden>
        <h2 class="categories-title">Browse by Category</h2>
        <div class="categories-list" id="categoriesContainer" role="list"></div>
      </section>
    </section>

    <section id="statusRegion" aria-live="polite">
      <div id="errorContainer"></div>
      <div id="loadingContainer" class="loading" hidden>
        <div class="spinner" aria-hidden="true"></div>
        <p>Fetching APIs…</p>
      </div>
    </section>

    <main class="results-container" id="resultsContainer" aria-live="polite"></main>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <footer>
    Data sourced from
    <a href="https://github.com/public-apis/public-apis" target="_blank" rel="noopener noreferrer">public-apis/public-apis</a>
  </footer>

  <noscript>
    <p class="noscript">This app requires JavaScript enabled in your browser.</p>
  </noscript>

  <script src="app.js"></script>
</body>
</html>
